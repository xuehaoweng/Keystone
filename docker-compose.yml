name: llm-gateway

services:
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    ports:
      - "18888:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - llm_gateway_net

  ingress:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8000}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - llm_gateway_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - llm_gateway_net

  gateway:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    environment:
      GATEWAY_DB_PATH: /app/data/gateway.db
      REDIS_URL: redis://redis:6379/0
      GATEWAY_JWT_SECRET: ${GATEWAY_JWT_SECRET:-change-me-in-production}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - gateway_db:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - llm_gateway_net

networks:
  llm_gateway_net:
    driver: bridge

volumes:
  redis_data:
  gateway_db:
